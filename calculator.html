<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>计算器</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
    }
    .calculator {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 20px;
      width: 320px;
    }
    .display {
      background: #1e1e1e;
      color: #fff;
      font-size: 2rem;
      text-align: right;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      min-height: 60px;
      overflow: hidden;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    button {
      font-size: 1.25rem;
      padding: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #e0e0e0;
      transition: background 0.2s;
    }
    button:hover {
      background: #d0d0d0;
    }
    button:active {
      background: #c0c0c0;
    }
    .operator {
      background: #ff9500;
      color: #fff;
    }
    .operator:hover {
      background: #e08900;
    }
    .equals {
      background: #34c759;
      color: #fff;
    }
    .equals:hover {
      background: #2db350;
    }
    .clear {
      background: #ff3b30;
      color: #fff;
    }
    .clear:hover {
      background: #e6352b;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button onclick="append('/')" class="operator">÷</button>
      <button onclick="append('*')" class="operator">×</button>
      <button onclick="backspace()" class="operator">⌫</button>
      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button onclick="append('-')" class="operator">−</button>
      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button onclick="append('+')" class="operator">+</button>
      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button onclick="calculate()" class="equals" style="grid-row: span 2;">=</button>
      <button onclick="append('0')" style="grid-column: span 2;">0</button>
      <button onclick="append('.')">.</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');
    let expression = '';

    function updateDisplay() {
      display.textContent = expression || '0';
    }

    function append(val) {
      expression += val;
      updateDisplay();
    }

    function clearDisplay() {
      expression = '';
      updateDisplay();
    }

    function backspace() {
      expression = expression.slice(0, -1);
      updateDisplay();
    }

    function calculate() {
      try {
        // 安全处理：只允许数字和运算符
        if (/^[0-9+\-*/.]+$/.test(expression)) {
          const result = eval(expression);
          expression = String(result);
          updateDisplay();
        }
      } catch (e) {
        display.textContent = '错误';
        expression = '';
      }
    }

    // 键盘支持
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') append(e.key);
      if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') append(e.key);
      if (e.key === '.') append('.');
      if (e.key === 'Enter') calculate();
      if (e.key === 'Escape') clearDisplay();
      if (e.key === 'Backspace') backspace();
    });
  </script>
</body>
</html>
